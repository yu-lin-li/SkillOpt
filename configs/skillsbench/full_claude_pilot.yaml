_base_: ../_base_/default.yaml

model:
  # Optimizer/reflection stay on the default SkillOpt OpenAI chat backend.
  target_backend: openai_chat

train:
  num_epochs: 4
  train_size: 0
  batch_size: 18
  accumulation: 1
  seed: 42

gradient:
  minibatch_size: 6
  merge_batch_size: 6
  analyst_workers: 4
  failure_only: false

optimizer:
  learning_rate: 4
  slow_update_samples: 18

evaluation:
  use_gate: true
  sel_env_num: 0
  test_env_num: 0
  eval_test: false

env:
  name: skillsbench
  skill_init: skillopt/envs/skillsbench/skills/initial.md
  skillsbench_root: /Users/liyulin/projects/skillsbench
  split_mode: split_dir
  split_dir: data/skillsbench_split
  skillsbench_agent: claude-agent-acp
  skillsbench_model: claude-haiku-4-5-20251001
  skillsbench_sandbox: docker
  sandbox_user: agent
  include_task_skills: false
  agent_idle_timeout: 600
  workers: 1
